<!DOCTYPE html>
<html>
<head>
    <title>ADMISSION FORM</title>
</head>
<body>

<header>  
    <h1>ADMISSION FORM</h1> 
</header>

<main> 
      <section>
        <form>
            <fieldset>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required><br><br>

            <label for=father_name">Father's Name:</label>
            <input type="text" id="father_name" name="father" required><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email required><br><br><br>

            <label for="dob">Date of Birth:</label>
            <input type="date" id="dob" name="08_09_2007" required><br><br>

            <label for="gender">Gender:</label>
            <input type="radio" id="male" name="gender" value="male" required><label for="male">Male</label><br> <br>      
            <input type="radio" id="female" name="gender" value="female" required><label for="female">Female</label><br><br>
            <input type="radio" id="other" name="gender" value="other" required><label for="other">Other</label><br><br>

            <label for="address">Address:</label>
            <textarea id="address" name="address" required></textarea><br><br>

            <label for="course">Course:</label>
            <select id="course" name="course" required>
                <option value="">Select a course</option>
                <option value="computer_science">Computer Science</option>
                <option value="business_administration">Business Administration</option>
                <option value="mechanical_engineering">Mechanical Engineering</option>
                <option value="civil_engineering">Civil Engineering</option>
            </select><br><br>
            <input type="submit" value="Submit">
            <input type="reset" value="Reset">
        </fieldset>
        </section>
</main>
<footer>
